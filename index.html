<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Editable Excel-Style Table</title>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
:root{--bg:#eef2f7;--panel:#fff;--grid:#cbd5e1;--head:#e2e8f0;--text:#1e293b;--muted:#64748b;--primary:#2563eb;--danger:#dc2626;--success:#15803d}
*{box-sizing:border-box} body{margin:0;font-family:Arial,sans-serif;background:var(--bg);color:var(--text)}
.app{max-width:1400px;margin:auto;padding:18px}.top{display:flex;justify-content:space-between;gap:12px;align-items:center;flex-wrap:wrap;margin-bottom:14px}
h1{margin:0;font-size:26px}.status{font-size:13px;color:var(--muted)}
.panel{background:var(--panel);border:1px solid #dbe3ec;border-radius:14px;padding:16px;margin-bottom:14px;box-shadow:0 10px 30px rgba(15,23,42,.08)}
.meta{display:grid;grid-template-columns:2fr 1.5fr 1fr;gap:12px}.field{display:flex;flex-direction:column;gap:6px}.full{grid-column:1/-1}
label{font-size:13px;font-weight:700;color:#475569}input,textarea,button{font:inherit}
input[type=text],input[type=date],input[type=number],textarea,select{width:100%;border:1px solid #cbd5e1;border-radius:8px;padding:10px 11px;background:#fff;outline:none}
input:focus,textarea:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(37,99,235,.12)}
textarea{resize:vertical;min-height:72px}.controls{display:flex;gap:10px;flex-wrap:wrap;align-items:end}
.group{display:flex;gap:7px;align-items:end;flex-wrap:wrap;padding:10px;border:1px solid #dbe3ec;border-radius:10px;background:#f8fafc}
.small{width:95px!important}button{border:0;border-radius:8px;padding:10px 13px;cursor:pointer;background:#e2e8f0;font-weight:700}
.primary{background:var(--primary);color:#fff}.success{background:var(--success);color:#fff}.danger{background:var(--danger);color:#fff}.secondary{background:#475569;color:#fff}
.sheet{overflow:auto;border:1px solid var(--grid);border-radius:10px;max-height:65vh;background:#fff}
table{border-collapse:collapse;width:100%;min-width:700px;table-layout:fixed}th,td{border:1px solid var(--grid);min-width:140px;height:42px;padding:8px;vertical-align:top;word-break:break-word}
th{position:sticky;top:0;z-index:2;background:var(--head);text-align:left}th:focus,td:focus{outline:none;box-shadow:inset 0 0 0 2px var(--primary);background:#eff6ff}
.rowno{width:48px;min-width:48px;max-width:48px;text-align:center;background:#f1f5f9;color:var(--muted);font-weight:700;position:sticky;left:0;z-index:1}.total-row td{background:#f8fafc;font-weight:700}.sum-cell{background:#dcfce7!important;color:#166534}
th.rowno{z-index:3}.hint{margin-top:8px;color:var(--muted);font-size:13px}.actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px}
.attachment-box{margin-top:14px;border:1px solid #dbe3ec;border-radius:10px;padding:12px;background:#f8fafc}
.attachment-head{display:flex;justify-content:space-between;gap:10px;align-items:center;flex-wrap:wrap}
.attachment-list{margin-top:10px;display:grid;gap:8px}
.attachment-item{display:flex;justify-content:space-between;gap:10px;align-items:center;padding:9px 10px;border:1px solid #dbe3ec;border-radius:8px;background:#fff}
.attachment-info{min-width:0}
.attachment-name{font-weight:700;word-break:break-word}
.attachment-meta{font-size:12px;color:var(--muted);margin-top:3px}
.attachment-buttons{display:flex;gap:6px;flex-wrap:wrap}
.empty-attachments{font-size:13px;color:var(--muted);padding:6px 0}
.save-banner{display:none;margin-bottom:12px;padding:9px 11px;border-radius:8px;background:#dcfce7;color:#166534;font-weight:700}
@media(max-width:760px){.meta{grid-template-columns:1fr}.full{grid-column:auto}.app{padding:10px}.group{width:100%}}
@media print{@page{size:landscape;margin:10mm}body{background:#fff}.app{max-width:none;padding:0}.top,.controlsPanel,.actions,.attachment-head button,.hint,.status,.save-banner{display:none!important}
.panel{box-shadow:none;border:0;padding:0;margin-bottom:10px}.sheet{overflow:visible;max-height:none;border:0}table{min-width:0;width:100%;font-size:10px}
th,td{min-width:0;height:auto;padding:5px}th,.rowno{position:static}th{background:#e5e7eb!important;-webkit-print-color-adjust:exact;print-color-adjust:exact}
input,textarea{border:0!important;box-shadow:none!important;padding:0;resize:none}}
</style>
</head>
<body>
<main class="app">
<div class="top"><h1>Editable Excel-Style Table</h1><div class="status" id="status">Ready</div></div>

<section class="panel">
<div class="meta">
<div class="field"><label>Title</label><input id="title" type="text" placeholder="Example: Customer Line Registration"></div>
<div class="field"><label>Company</label><input id="company" type="text" placeholder="Enter company name"></div>
<div class="field"><label>Date</label><input id="date" type="date"></div>
<div class="field full"><label>Remarks</label><textarea id="remarks" placeholder="Add remarks here..."></textarea></div>
</div>
</section>

<section class="panel controlsPanel">
<div class="controls">
<div class="group"><div class="field"><label>Rows to add</label><input id="rowsToAdd" class="small" type="number" value="1" min="1" max="500"></div><button class="primary" id="addRows">Add Row(s)</button></div>
<div class="group"><div class="field"><label>Columns to add</label><input id="colsToAdd" class="small" type="number" value="1" min="1" max="50"></div><button class="primary" id="addCols">Add Column(s)</button></div>
<div class="group"><button id="delRow">Delete Last Row</button><button id="delCol">Delete Last Column</button></div>
<div class="group">
  <div class="field">
    <label>Auto Sum Column</label>
    <select id="sumColumn" class="small"></select>
  </div>
  <button id="toggleSum">Add Auto Sum</button>
</div>
</div>
<div class="hint">Click any header or cell to edit. Changes are saved automatically in this browser.</div>
</section>

<section class="panel">
<div class="sheet">
<table>
<thead><tr id="header"><th class="rowno">#</th></tr></thead>
<tbody id="body"></tbody>
</table>
</div>
<div id="saveBanner" class="save-banner">Saved successfully.</div>
<div class="actions">
<button class="primary" id="saveNow">Save</button>
<button class="success" id="pdf">Export to PDF</button>
<button class="success" id="excel">Export to Excel</button>
<button class="secondary" id="backup">Export Backup</button>
<button id="restore">Import Backup</button>
<input id="file" type="file" accept=".json,application/json" hidden>
<button class="danger" id="clear">Clear All</button>
</div>

<div class="attachment-box">
  <div class="attachment-head">
    <div>
      <strong>Attachments</strong>
      <div class="hint">Files are stored in this browser and included in your exported backup.</div>
    </div>
    <div>
      <button id="uploadAttachment">Upload Attachment</button>
      <input id="attachmentFile" type="file" multiple hidden>
    </div>
  </div>
  <div id="attachmentList" class="attachment-list"></div>
</div>
</section>
</main>

<script>
const KEY="editable_excel_table_v1";
const $=id=>document.getElementById(id);
let state={title:"",company:"",date:new Date().toISOString().slice(0,10),remarks:"",headers:["Column 1","Column 2","Column 3"],rows:[["","",""],["","",""],["","",""]],attachments:[],sumColumns:[]};

function load(){
  try{
    const x=JSON.parse(localStorage.getItem(KEY));
    if(x&&Array.isArray(x.headers)&&Array.isArray(x.rows))state=x
  }catch(e){}
  if(!state.date)state.date=new Date().toISOString().slice(0,10);
  if(!Array.isArray(state.attachments))state.attachments=[];if(!Array.isArray(state.sumColumns))state.sumColumns=[];
}
function save(showBanner=false){
  localStorage.setItem(KEY,JSON.stringify(state));
  $("status").textContent="Saved "+new Date().toLocaleTimeString([], {hour:"2-digit",minute:"2-digit"});
  if(showBanner){
    const banner=$("saveBanner");
    banner.style.display="block";
    clearTimeout(window.__saveBannerTimer);
    window.__saveBannerTimer=setTimeout(()=>banner.style.display="none",2200);
  }
}
function syncMeta(){state.title=$("title").value;state.company=$("company").value;state.date=$("date").value;state.remarks=$("remarks").value;save()}
function renderMeta(){$("title").value=state.title||"";$("company").value=state.company||"";$("date").value=state.date;$("remarks").value=state.remarks||""}

function parseNumber(value){
  const cleaned=String(value??"").replace(/,/g,"").replace(/[^\d.-]/g,"");
  const number=Number(cleaned);
  return Number.isFinite(number)?number:0;
}

function calculateColumnSum(colIndex){
  return state.rows.reduce((total,row)=>total+parseNumber(row[colIndex]),0);
}

function refreshSumSelector(){
  const select=$("sumColumn");
  const current=select.value;
  select.innerHTML="";
  state.headers.forEach((header,index)=>{
    const option=document.createElement("option");
    option.value=index;
    option.textContent=(state.sumColumns.includes(index)?"✓ ":"")+header;
    select.appendChild(option);
  });
  if([...select.options].some(o=>o.value===current))select.value=current;
}

function renderTable(){
 const h=$("header"); h.innerHTML='<th class="rowno">#</th>';
 state.headers.forEach((v,i)=>{
   const th=document.createElement("th");
   th.contentEditable=true;
   th.textContent=v;
   th.oninput=()=>{
     state.headers[i]=th.textContent.trim()||`Column ${i+1}`;
     refreshSumSelector();
     save();
   };
   h.appendChild(th);
 });

 const b=$("body"); b.innerHTML="";
 state.rows.forEach((r,ri)=>{
   while(r.length<state.headers.length)r.push("");
   if(r.length>state.headers.length)r.length=state.headers.length;
   const tr=document.createElement("tr");
   const n=document.createElement("td");
   n.className="rowno";
   n.textContent=ri+1;
   tr.appendChild(n);

   r.forEach((v,ci)=>{
     const td=document.createElement("td");
     td.contentEditable=true;
     td.textContent=v;
     td.oninput=()=>{
       state.rows[ri][ci]=td.textContent;
       updateTotalsOnly();
       save();
     };
     tr.appendChild(td);
   });
   b.appendChild(tr);
 });

 const totalRow=document.createElement("tr");
 totalRow.className="total-row";
 const label=document.createElement("td");
 label.className="rowno";
 label.textContent="Σ";
 totalRow.appendChild(label);

 state.headers.forEach((_,ci)=>{
   const td=document.createElement("td");
   td.dataset.totalCol=ci;
   if(state.sumColumns.includes(ci)){
     td.className="sum-cell";
     td.textContent=calculateColumnSum(ci).toLocaleString(undefined,{maximumFractionDigits:2});
   }
   totalRow.appendChild(td);
 });
 b.appendChild(totalRow);
 refreshSumSelector();
}

function updateTotalsOnly(){
  state.sumColumns.forEach(ci=>{
    const cell=document.querySelector(`[data-total-col="${ci}"]`);
    if(cell)cell.textContent=calculateColumnSum(ci).toLocaleString(undefined,{maximumFractionDigits:2});
  });
}

function addRows(n){n=Math.max(1,Math.min(500,Number(n)||1));for(let i=0;i<n;i++)state.rows.push(Array(state.headers.length).fill(""));renderTable();save()}
function addCols(n){n=Math.max(1,Math.min(50,Number(n)||1));const s=state.headers.length;for(let i=0;i<n;i++)state.headers.push(`Column ${s+i+1}`);state.rows.forEach(r=>{for(let i=0;i<n;i++)r.push("")});renderTable();save()}
function delRow(){if(state.rows.length<=1)return alert("At least one row must remain.");state.rows.pop();renderTable();save()}
function delCol(){if(state.headers.length<=1)return alert("At least one column must remain.");state.headers.pop();state.rows.forEach(r=>r.pop());renderTable();save()}


function formatBytes(bytes){
  if(bytes===0)return "0 Bytes";
  const k=1024, units=["Bytes","KB","MB","GB"];
  const i=Math.floor(Math.log(bytes)/Math.log(k));
  return (bytes/Math.pow(k,i)).toFixed(i?1:0)+" "+units[i];
}

function renderAttachments(){
  const list=$("attachmentList");
  list.innerHTML="";
  if(!state.attachments.length){
    list.innerHTML='<div class="empty-attachments">No attachments uploaded yet.</div>';
    return;
  }
  state.attachments.forEach((a,index)=>{
    const item=document.createElement("div");
    item.className="attachment-item";

    const info=document.createElement("div");
    info.className="attachment-info";
    const name=document.createElement("div");
    name.className="attachment-name";
    name.textContent=a.name;
    const meta=document.createElement("div");
    meta.className="attachment-meta";
    meta.textContent=formatBytes(a.size||0)+" • "+new Date(a.addedAt).toLocaleString();
    info.append(name,meta);

    const buttons=document.createElement("div");
    buttons.className="attachment-buttons";

    const download=document.createElement("button");
    download.textContent="Download";
    download.onclick=()=>{
      const link=document.createElement("a");
      link.href=a.data;
      link.download=a.name;
      link.click();
    };

    const remove=document.createElement("button");
    remove.textContent="Remove";
    remove.className="danger";
    remove.onclick=()=>{
      if(!confirm("Remove this attachment?"))return;
      state.attachments.splice(index,1);
      renderAttachments();
      save(true);
    };

    buttons.append(download,remove);
    item.append(info,buttons);
    list.appendChild(item);
  });
}

function addAttachments(files){
  const selected=[...files];
  if(!selected.length)return;

  let completed=0;
  selected.forEach(file=>{
    if(file.size>8*1024*1024){
      alert(file.name+" is larger than 8 MB and was not added.");
      completed++;
      if(completed===selected.length){renderAttachments();save(true)}
      return;
    }

    const reader=new FileReader();
    reader.onload=()=>{
      state.attachments.push({
        id:(crypto.randomUUID?crypto.randomUUID():Date.now()+"_"+Math.random()),
        name:file.name,
        type:file.type||"application/octet-stream",
        size:file.size,
        addedAt:new Date().toISOString(),
        data:reader.result
      });
      completed++;
      if(completed===selected.length){
        renderAttachments();
        save(true);
      }
    };
    reader.onerror=()=>{
      completed++;
      alert("Unable to read "+file.name);
      if(completed===selected.length){renderAttachments();save(true)}
    };
    reader.readAsDataURL(file);
  });
}


function toggleAutoSum(){
  const colIndex=Number($("sumColumn").value);
  if(!Number.isInteger(colIndex))return;
  const existing=state.sumColumns.indexOf(colIndex);
  if(existing>=0){
    state.sumColumns.splice(existing,1);
  }else{
    state.sumColumns.push(colIndex);
    state.sumColumns.sort((a,b)=>a-b);
  }
  renderTable();
  save(true);
}

function exportExcel(){
  syncMeta();
  if(typeof XLSX==="undefined"){
    alert("Excel export library could not load. Please check your internet connection and try again.");
    return;
  }

  const wb=XLSX.utils.book_new();
  const data=[];

  data.push([state.title||""]);
  data.push(["Company",state.company||""]);
  data.push(["Date",state.date||""]);
  data.push(["Remarks",state.remarks||""]);
  data.push([]);
  data.push(["#",...state.headers]);

  state.rows.forEach((row,index)=>{
    data.push([index+1,...row]);
  });

  const totals=["TOTAL"];
  state.headers.forEach((_,ci)=>{
    totals.push(state.sumColumns.includes(ci)?calculateColumnSum(ci):"");
  });
  data.push(totals);

  const ws=XLSX.utils.aoa_to_sheet(data);

  ws["!cols"]=[
    {wch:7},
    ...state.headers.map((header,ci)=>{
      const max=Math.max(
        String(header).length,
        ...state.rows.map(row=>String(row[ci]??"").length),
        12
      );
      return {wch:Math.min(max+2,40)};
    })
  ];

  ws["!merges"]=[{s:{r:0,c:0},e:{r:0,c:Math.max(1,state.headers.length)}}];

  XLSX.utils.book_append_sheet(wb,ws,"Worksheet");

  const safeName=(state.title||state.company||"worksheet")
    .replace(/[\\/:*?"<>|]+/g,"_")
    .slice(0,80);

  XLSX.writeFile(wb,`${safeName}_${state.date||"export"}.xlsx`);
}

$("saveNow").onclick=()=>{syncMeta();save(true)};
$("uploadAttachment").onclick=()=>$("attachmentFile").click();
$("attachmentFile").onchange=e=>{addAttachments(e.target.files);e.target.value=""};

$("addRows").onclick=()=>addRows($("rowsToAdd").value);
$("addCols").onclick=()=>addCols($("colsToAdd").value);
$("delRow").onclick=delRow;$("delCol").onclick=delCol;$("toggleSum").onclick=toggleAutoSum;
["title","company","date","remarks"].forEach(id=>$(id).addEventListener("input",syncMeta));

$("pdf").onclick=()=>{syncMeta();document.title=state.title||"Editable Table";window.print()};
$("excel").onclick=exportExcel;
$("backup").onclick=()=>{syncMeta();const blob=new Blob([JSON.stringify(state,null,2)],{type:"application/json"});const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download=((state.title||"table").replace(/[^a-z0-9_-]+/gi,"_"))+"_"+(state.date||"backup")+".json";a.click();URL.revokeObjectURL(a.href)};
$("restore").onclick=()=>$("file").click();
$("file").onchange=e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=()=>{try{const x=JSON.parse(r.result);if(!x||!Array.isArray(x.headers)||!Array.isArray(x.rows))throw 0;state=x;if(!state.date)state.date=new Date().toISOString().slice(0,10);renderMeta();renderTable();renderAttachments();save();alert("Backup imported successfully.")}catch{alert("Invalid backup file.")}$("file").value=""};r.readAsText(f)};
$("clear").onclick=()=>{if(!confirm("Clear all information and table data?"))return;state={title:"",company:"",date:new Date().toISOString().slice(0,10),remarks:"",headers:["Column 1","Column 2","Column 3"],rows:[["","",""],["","",""],["","",""]],attachments:[],sumColumns:[]};renderMeta();renderTable();renderAttachments();save()};

load();renderMeta();renderTable();renderAttachments();
</script>
</body>
</html>
